<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
      rel="stylesheet" />
    <!-- referencia al archivo .css -->
    <link rel="stylesheet" href="./css/styles.css" />
    <title>ProyectoM1_JuanManuelViñuelaOrtiz</title>
  </head>

  <body>
    <header>
      <nav class="nav">
        <img src="./assest/img/chromastudio_full_logo.png" alt="ChromaStudio" class="navbar-logo">         
        <ul class="nav_links">
          <li><a class="nav_link" href="#colores">Generar Colores</a></li>   
        </ul>
      </nav>
    </header>

    <!-- Navegacion principal -->
    <main>
      <section id="colores">
        <h2><span class="mayuscula">p</span>aleta de <span class="mayuscula">c</span>olores</h2>

        <!-- Boton nuevo: dispara la generacion de colores -->
        <div class="controles">
          <button class="boton boton-primario" id="generar">Generar colores Random</button>
          <div class="controles_campo">
            <label class="controles_label" for="cantidad">Seleccionar cantidad de colores</label>
            <select class="select" id="cantidad">
              <option value="6">6 colores</option>
              <option value="8">8 colores</option>
              <option value="10">10 colores</option>
            </select>
          </div>
        </div>
        <section class="galeria" id="galeria"></section>
      </section>
    </main>

    <footer>
      <p>Colores Random © 2026 | Todos los derechos reservados | Términos y condiciones</p>
    </footer>

    <script src="./js/index.js"></script>
  </body>
</html>
